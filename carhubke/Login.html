<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarHubKE - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #7a8b3a 0%, #4a5d23 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #4a5d23;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .tagline {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 28px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 24px;
            font-size: 22px;
        }
        .welcome-banner {
            display: none;
            background: linear-gradient(90deg, #7a8b3a, #4a5d23);
            color: white;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 15px;
            animation: slideDown 0.6s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 13px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #7a8b3a;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #7a8b3a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #4a5d23;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74,93,35,0.3);
        }
        .signup-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .signup-link a {
            color: #7a8b3a;
            text-decoration: none;
            font-weight: 600;
        }
        .error {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">CARHUB<span style="color:#d4a017;">KE</span></div>
        <div class="tagline">Kenya's Premium Car Marketplace</div>
        
        <div class="welcome-banner" id="welcomeBanner"></div>
        
        <h2>LOGIN</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <div class="error" id="loginError">Invalid email or password</div>
            <button type="submit">Login</button>
        </form>
        <div class="signup-link">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
    </div>

    <script>
        // Check for new user welcome message
        const urlParams = new URLSearchParams(window.location.search);
        const isNewUser = urlParams.get('newuser');
        const userName = urlParams.get('name');
        
        if(isNewUser === '1' && userName) {
            const banner = document.getElementById('welcomeBanner');
            banner.innerHTML = `👋 Welcome back, <strong>${decodeURIComponent(userName)}</strong>! Please login to continue.`;
            banner.style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const storedUser = JSON.parse(localStorage.getItem('carhubUser') || '{}');
            
            // Demo validation (in production, this goes to PHP/MySQL backend)
            if(storedUser.email === email && storedUser.password === password) {
                // Set session
                sessionStorage.setItem('carhubSession', JSON.stringify({
                    name: storedUser.fullName,
                    email: storedUser.email,
                    loginTime: new Date().toISOString()
                }));
                window.location.href = 'dashboard.html';
            } else {
                // For demo: allow any login if no user exists yet
                if(!storedUser.email) {
                    sessionStorage.setItem('carhubSession', JSON.stringify({
                        name: 'Guest User',
                        email: email,
                        loginTime: new Date().toISOString()
                    }));
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            }
        });
    </script>
</body>
</html>
