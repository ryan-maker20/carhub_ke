<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarHub KE - Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container" class="card">
        
        <div id="login-view">
            <h2>LOGIN</h2>
            <div id="login-message" class="hidden success-text">Account created successfully. Please log in!</div>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email Address" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" class="btn">LOGIN</button>
            </form>
            <p class="toggle-text">Don't have an account? <a href="#" id="showSignup">Create Account</a></p>
        </div>

        <div id="signup-view" class="hidden">
            <h2>Create Account</h2>
            <form id="signupForm">
                <input type="text" id="signupName" placeholder="e.g., Ryan Nyagaka" required>
                <input type="email" id="signupEmail" placeholder="Email Address" required>
                <input type="password" id="signupPassword" placeholder="Password" required>
                
                <div class="strength-meter-container">
                    <div id="strength-bar" class="strength-bar"></div>
                </div>
                <p id="strength-text" class="strength-text">Password Strength</p>

                <button type="submit" class="btn">Create Account</button>
            </form>
            <p class="toggle-text">Already have an account? <a href="#" id="showLogin">Login</a></p>
        </div>

    </div>

    <div id="dashboard-container" class="card hidden">
        <h1 id="welcomeMessage">Welcome back!</h1>
        <p>Your CarHub KE profile is ready.</p>
        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
    </div>

    <script src="dynamic.js"></script>
</body>
</html>
